[mgr]
sort_by = "natural"

[opener]
text = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]
video = [
    { run = 'mpv "$@"', orphan = true, for = "unix" },
]
audio = [
    { run = 'mpv --no-video "$@"', block = true, for = "unix" },
]
image = [
    { run = 'vimiv "$@"', orphan = true, for = "unix" },
]
pdf = [
    { run = 'zathura "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
    { mime = "text/*", use = "text" },
    { mime = "application/json", use = "text" },
    { mime = "application/x-ndjson", use = "text" },
    { mime = "application/xml", use = "text" },
    { mime = "application/javascript", use = "text" },
    { mime = "application/x-javascript", use = "text" },
    { mime = "application/typescript", use = "text" },
    { mime = "application/x-sh", use = "text" },
    { mime = "application/x-shellscript", use = "text" },
    { mime = "application/toml", use = "text" },
    { mime = "application/yaml", use = "text" },
    { mime = "application/x-yaml", use = "text" },
    { mime = "application/x-perl", use = "text" },
    { mime = "application/x-python", use = "text" },
    { mime = "application/x-ruby", use = "text" },
    { mime = "application/x-lua", use = "text" },
    { mime = "application/sql", use = "text" },
    { mime = "inode/empty", use = "text" },

    # Name-based rules — ensures empty new files open correctly in nvim
    # Systems / compiled
    { name = "*.{c,h}", use = "text" },
    { name = "*.{cpp,cc,cxx,hpp,hxx,hh}", use = "text" },
    { name = "*.{rs,go,zig,nim,cr,v}", use = "text" },
    { name = "*.{java,kt,kts,scala,cs,swift,dart}", use = "text" },
    # Scripting / interpreted
    { name = "*.{py,pyi}", use = "text" },
    { name = "*.{rb,php,lua,pl,pm,r}", use = "text" },
    { name = "*.{ex,exs,erl,hrl,hs,ml,mli,fs,fsx,elm,clj,cljs,jl}", use = "text" },
    # Web / JS ecosystem
    { name = "*.{js,mjs,cjs,jsx}", use = "text" },
    { name = "*.{ts,mts,cts,tsx}", use = "text" },
    { name = "*.{html,htm,css,scss,sass,less}", use = "text" },
    { name = "*.{vue,svelte,astro}", use = "text" },
    # Shell
    { name = "*.{sh,bash,zsh,fish,nu}", use = "text" },
    # Config / data
    { name = "*.{json,jsonc,json5}", use = "text" },
    { name = "*.{yaml,yml,toml,xml,xsl,xsd}", use = "text" },
    { name = "*.{ini,cfg,conf,env}", use = "text" },
    { name = "*.{csv,tsv}", use = "text" },
    # Build / infra
    { name = "*.{nix,tf,tfvars,gradle}", use = "text" },
    { name = "*.{cmake,mk,makefile}", use = "text" },
    { name = "Dockerfile*", use = "text" },
    { name = "Makefile", use = "text" },
    { name = "*.{lock,log}", use = "text" },
    # Docs / markup
    { name = "*.{md,mdx,rst,org,tex,sty}", use = "text" },
    { name = "*.txt", use = "text" },
    # Other dev
    { name = "*.{proto,graphql,gql,sql}", use = "text" },
    { name = "*.{glsl,wgsl,hlsl,vert,frag,comp}", use = "text" },
    { name = "*.{diff,patch}", use = "text" },
    { name = "*.{pem,crt,cer,key}", use = "text" },

    { mime = "image/*", use = "image" },
    { mime = "video/*", use = "video" },
    { mime = "audio/*", use = "audio" },
    { mime = "application/pdf", use = "pdf" },
    { name = "*", use = "text" },
]
