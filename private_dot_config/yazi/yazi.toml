[mgr]
sort_by = "natural"

[opener]
text = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]
video = [
    { run = 'mpv "$@"', orphan = true, for = "unix" },
]
audio = [
    { run = 'mpv --no-video "$@"', block = true, for = "unix" },
]
image = [
    { run = 'vimiv "$@"', orphan = true, for = "unix" },
]
pdf = [
    { run = 'zathura "$@"', orphan = true, for = "unix" },
]
csv = [
    { run = '/home/feeco/.cargo/bin/csvlens "$@"', block = true, for = "unix" },
]
docx = [
    { run = '/home/feeco/.cargo/bin/doxx "$@"', block = true, for = "unix" },
]
xlsx = [
    { run = '/home/feeco/.cargo/bin/tw "$@"', block = true, for = "unix" },
]

[open]
rules = [
    { mime = "text/csv", use = "csv" },
    { url = "*.csv", use = "csv" },
    { mime = "application/vnd.openxmlformats-officedocument.wordprocessingml.document", use = "docx" },
    { url = "*.docx", use = "docx" },
    { mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", use = "xlsx" },
    { url = "*.xlsx", use = "xlsx" },
    { mime = "text/*", use = "text" },
    { mime = "application/json", use = "text" },
    { mime = "application/x-ndjson", use = "text" },
    { mime = "application/xml", use = "text" },
    { mime = "application/javascript", use = "text" },
    { mime = "application/x-javascript", use = "text" },
    { mime = "application/typescript", use = "text" },
    { mime = "application/x-sh", use = "text" },
    { mime = "application/x-shellscript", use = "text" },
    { mime = "application/toml", use = "text" },
    { mime = "application/yaml", use = "text" },
    { mime = "application/x-yaml", use = "text" },
    { mime = "application/x-perl", use = "text" },
    { mime = "application/x-python", use = "text" },
    { mime = "application/x-ruby", use = "text" },
    { mime = "application/x-lua", use = "text" },
    { mime = "application/sql", use = "text" },
    { mime = "inode/empty", use = "text" },

    # URL-based rules — ensures empty new files open correctly in nvim
    # Systems / compiled
    { url = "*.{c,h}", use = "text" },
    { url = "*.{cpp,cc,cxx,hpp,hxx,hh}", use = "text" },
    { url = "*.{rs,go,zig,nim,cr,v}", use = "text" },
    { url = "*.{java,kt,kts,scala,cs,swift,dart}", use = "text" },
    # Scripting / interpreted
    { url = "*.{py,pyi}", use = "text" },
    { url = "*.{rb,php,lua,pl,pm,r}", use = "text" },
    { url = "*.{ex,exs,erl,hrl,hs,ml,mli,fs,fsx,elm,clj,cljs,jl}", use = "text" },
    # Web / JS ecosystem
    { url = "*.{js,mjs,cjs,jsx}", use = "text" },
    { url = "*.{ts,mts,cts,tsx}", use = "text" },
    { url = "*.{html,htm,css,scss,sass,less}", use = "text" },
    { url = "*.{vue,svelte,astro}", use = "text" },
    # Shell
    { url = "*.{sh,bash,zsh,fish,nu}", use = "text" },
    # Config / data
    { url = "*.{json,jsonc,json5}", use = "text" },
    { url = "*.{yaml,yml,toml,xml,xsl,xsd}", use = "text" },
    { url = "*.{ini,cfg,conf,env}", use = "text" },
    { url = "*.tsv", use = "text" },
    # Build / infra
    { url = "*.{nix,tf,tfvars,gradle}", use = "text" },
    { url = "*.{cmake,mk,makefile}", use = "text" },
    { url = "Dockerfile*", use = "text" },
    { url = "Makefile", use = "text" },
    { url = "*.{lock,log}", use = "text" },
    # Docs / markup
    { url = "*.{md,mdx,rst,org,tex,sty}", use = "text" },
    { url = "*.txt", use = "text" },
    # Other dev
    { url = "*.{proto,graphql,gql,sql}", use = "text" },
    { url = "*.{glsl,wgsl,hlsl,vert,frag,comp}", use = "text" },
    { url = "*.{diff,patch}", use = "text" },
    { url = "*.{pem,crt,cer,key}", use = "text" },

    { mime = "image/*", use = "image" },
    { mime = "video/*", use = "video" },
    { mime = "audio/*", use = "audio" },
    { mime = "application/pdf", use = "pdf" },
    { url = "*", use = "text" },
]
